<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gold Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginScreen" class="loginScreen">
  <div class="loginBox">
    <div class="logo big">WE BUY GOLD</div>
    <h1>Cash Out Gold & Silver</h1>
    <p>Employee Login</p>

    <input id="loginEmail" type="email" placeholder="Employee email">
    <input id="loginPassword" type="password" placeholder="Password">

    <button id="loginBtn">Login</button>
    <button id="signupBtn" class="secondary">Create Account</button>
  </div>
</div>

<div id="app" class="hidden">
  <h1 style="padding:20px">Logged In ✅</h1>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
<button onclick="saveData()">Save to Cloud</button>
