<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gold Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginScreen" class="loginScreen">
  <div class="loginBox">
    <div class="logo big">WE BUY GOLD</div>
    <h1>Cash Out Gold & Silver</h1>
    <p>Employee Login</p>

    <input id="loginEmail" type="email" placeholder="Employee email">
    <input id="loginPassword" type="password" placeholder="Password">

    <button id="loginBtn">Login</button>
    <button id="signupBtn" class="secondary">Create Account</button>
  </div>
</div>

<div id="app" class="hidden">
  <h1 style="padding:20px">Logged In ✅</h1>

  <div style="padding:20px">
    <input id="customer" placeholder="Customer Name"><br><br>

    <input id="weight" type="number" placeholder="Weight (grams)" oninput="calculatePayout()"><br><br>

    <select id="karat" onchange="calculatePayout()">
      <option value="10">10K</option>
      <option value="14">14K</option>
      <option value="18">18K</option>
      <option value="22">22K</option>
      <option value="24">24K</option>
    </select><br><br>

    <input id="spot" type="number" placeholder="Gold Spot Price" oninput="calculatePayout()"><br><br>

    <input id="payout" type="number" placeholder="Payout %" value="90" oninput="calculatePayout()"><br><br>

    <h2>Total Payout:</h2>
    <h1 id="result">$0.00</h1>

    <button onclick="saveData()">Save to Cloud</button>
  </div>
</div>
<script type="module" src="app.js"></script>


</body>
</html>
